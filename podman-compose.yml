version: "3.9"

services:
  # Frontend - Next.js Application
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: expertie-frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_URL=http://localhost:8000/api/v1
    volumes:
      - frontend_uploads:/app/uploads
    networks:
      - expertie-network
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    depends_on:
      backend:
        condition: service_healthy

  # Backend - FastAPI Application
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: expertie-backend
    restart: unless-stopped
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    environment:
      - APP_ENV=production
      - DEBUG=false
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-expertie_user}:${POSTGRES_PASSWORD:-expertie_password}@postgres:5432/${POSTGRES_DB:-expertie_db}
      - REDIS_URL=redis://redis:6379/0
      - REDIS_PASSWORD=${REDIS_PASSWORD:-redis_password}
      - SECRET_KEY=${SECRET_KEY:-your-super-secret-key-change-in-production}
      - ALGORITHM=HS256
      - ACCESS_TOKEN_EXPIRE_HOURS=24
      - REFRESH_TOKEN_EXPIRE_DAYS=7
      - CORS_ORIGINS=["http://localhost:3000","http://localhost:8080"]
      - CORS_ALLOW_CREDENTIALS=true
      - CORS_ALLOW_METHODS=["*"]
      - CORS_ALLOW_HEADERS=["*"]
      - TENCENT_SECRET_ID=${TENCENT_SECRET_ID:-your-tencent-secret-id}
      - TENCENT_SECRET_KEY=${TENCENT_SECRET_KEY:-your-tencent-secret-key}
      - TENCENT_REGION=${TENCENT_REGION:-ap-shanghai}
      - AI_API_KEY=${AI_API_KEY:-your-ai-api-key}
      - AI_API_BASE_URL=${AI_API_BASE_URL:-https://api.deepseek.com/v1}
      - AI_MODEL=${AI_MODEL:-deepseek-chat}
      - TRANSLATION_CACHE_TTL=86400
      - TRANSLATION_MAX_RETRIES=3
      - TRANSLATION_TIMEOUT=30
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    volumes:
      - backend_uploads:/app/uploads
      - backend_logs:/app/logs
    networks:
      - expertie-network
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # PostgreSQL Database
  postgres:
    image: docker.io/postgres:16-alpine
    container_name: expertie-postgres
    restart: unless-stopped
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-expertie_user}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-expertie_password}
      - POSTGRES_DB=${POSTGRES_DB:-expertie_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - expertie-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-expertie_user} -d ${POSTGRES_DB:-expertie_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # Redis Cache
  redis:
    image: docker.io/redis:7-alpine
    container_name: expertie-redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    command: redis-server --requirepass ${REDIS_PASSWORD:-redis_password} --appendonly yes
    volumes:
      - redis_data:/data
    networks:
      - expertie-network
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-redis_password}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

networks:
  expertie-network:
    driver: bridge

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  backend_uploads:
    driver: local
  backend_logs:
    driver: local
  frontend_uploads:
    driver: local
